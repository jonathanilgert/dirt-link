      if (!id) return;
      var s = document.createElement('script'); s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=' + encodeURIComponent(id);
      document.head.appendChild(s);
      gtag('js', new Date()); gtag('config', id);
    })();
  </script>
