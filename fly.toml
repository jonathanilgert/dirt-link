# fly.toml — https://fly.io/docs/reference/configuration/
# Deploy: fly launch (first time) or fly deploy

app = "dirtlink"
primary_region = "sea"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for SQLite database
[[mounts]]
  source = "dirtlink_data"
  destination = "/app/data"
  initial_size = "1gb"

# Persistent volume for uploaded files
[[mounts]]
  source = "dirtlink_uploads"
  destination = "/app/uploads"
  initial_size = "3gb"
