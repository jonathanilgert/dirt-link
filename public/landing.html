<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DirtLink — Calgary's earth material marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;460;480;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
:root {
  --bg: #F5F2EC;
  --bg-elev: #FBF9F4;
  --surface: #FFFFFF;
  --ink: #1C1F22;
  --ink-2: #3A3F45;
  --ink-3: #6B7078;
  --ink-4: #9CA1A8;
  --hairline: #E5DFD2;
  --hairline-2: #EFEAE0;
  --accent: #C44A1A;
  --accent-2: #E07A3E;
  --accent-ink: #FFFFFF;
  --warn: #3D5A48;
  --map-bg: #ECE6D9;
  --map-line: #D7CEBA;
  --map-water: #D6DCD4;
  --shadow-sm: 0 1px 2px rgba(28,31,34,0.04), 0 1px 1px rgba(28,31,34,0.03);
  --shadow-md: 0 8px 24px -12px rgba(28,31,34,0.12), 0 2px 6px rgba(28,31,34,0.04);
  --shadow-lg: 0 24px 56px -20px rgba(28,31,34,0.22), 0 8px 20px -8px rgba(28,31,34,0.08);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 80px; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--ink);
  font-family: 'Inter Tight', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-feature-settings: 'ss01','cv11';
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.45;
  font-size: 16px;
}
.mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace; font-feature-settings: 'ss02','cv01'; }
.container { max-width: 1320px; margin: 0 auto; padding: 0 32px; }
@media (max-width: 720px) { .container { padding: 0 20px; } }
.section { padding: 96px 0; border-top: 1px solid var(--hairline); }
.eyebrow {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-3); display: inline-flex; align-items: center; gap: 8px;
}
.eyebrow::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 1px; display: inline-block; }
h1, h2, h3, h4 { font-family: 'Inter Tight','Inter',sans-serif; font-weight: 500; letter-spacing: -0.02em; color: var(--ink); margin: 0; text-wrap: balance; }
h1 { font-size: clamp(44px, 5.6vw, 80px); line-height: 0.98; letter-spacing: -0.035em; font-weight: 480; }
h2 { font-size: clamp(32px, 3.8vw, 52px); line-height: 1.02; letter-spacing: -0.028em; }
h3 { font-size: 22px; line-height: 1.2; letter-spacing: -0.02em; font-weight: 500; }
p { margin: 0; color: var(--ink-2); }
.lede { font-size: 18px; line-height: 1.5; color: var(--ink-2); max-width: 56ch; text-wrap: pretty; }
.btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 12px 18px; border-radius: 6px;
  font-family: inherit; font-size: 14.5px; font-weight: 500; letter-spacing: -0.005em; cursor: pointer;
  border: 1px solid transparent; background: transparent; color: var(--ink);
  transition: background .15s ease, border-color .15s ease, transform .15s ease, color .15s ease;
  text-decoration: none; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.btn-primary:hover { transform: translateY(-1px); background: color-mix(in oklab, var(--accent) 90%, black); }
.btn-secondary { background: var(--surface); border-color: var(--hairline); color: var(--ink); }
.btn-secondary:hover { border-color: var(--ink-3); }
.btn-ghost { color: var(--ink-2); }
.btn-ghost:hover { color: var(--ink); }
.btn-sm { padding: 8px 12px; font-size: 13px; }
.nav { position: sticky; top: 0; z-index: 40; background: color-mix(in srgb, var(--bg) 85%, transparent); backdrop-filter: saturate(180%) blur(14px); -webkit-backdrop-filter: saturate(180%) blur(14px); border-bottom: 1px solid var(--hairline); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
.nav-links { display: flex; gap: 28px; font-size: 14px; color: var(--ink-2); }
.nav-links a { color: inherit; text-decoration: none; }
.nav-links a:hover { color: var(--ink); }
.logo { display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 17px; letter-spacing: -0.02em; color: var(--ink); text-decoration: none; }
.logo-mark { width: 26px; height: 26px; background: var(--bg-elev); border-radius: 5px; display: grid; place-items: center; overflow: hidden; border: 1px solid var(--hairline); }
.card { background: var(--surface); border: 1px solid var(--hairline); border-radius: 12px; padding: 24px; }
.tile { background: var(--surface); border: 1px solid var(--hairline); border-radius: 14px; overflow: hidden; }
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 9px; border-radius: 999px; background: var(--bg-elev); border: 1px solid var(--hairline); font-size: 12px; color: var(--ink-2); font-family: 'JetBrains Mono', monospace; letter-spacing: -0.01em; }
.chip-have { background: color-mix(in oklab, var(--accent) 12%, var(--surface)); border-color: color-mix(in oklab, var(--accent) 30%, var(--hairline)); color: var(--accent); }
.chip-need { background: color-mix(in oklab, var(--warn) 12%, var(--surface)); border-color: color-mix(in oklab, var(--warn) 30%, var(--hairline)); color: var(--warn); }
.dot { width: 7px; height: 7px; border-radius: 99px; display: inline-block; background: currentColor; }
.map-surface { position: relative; background: var(--map-bg); overflow: hidden; }
.map-surface::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(to right, var(--map-line) 1px, transparent 1px), linear-gradient(to bottom, var(--map-line) 1px, transparent 1px); background-size: 48px 48px; opacity: 0.35; pointer-events: none; }
.row { display: flex; }
.col { display: flex; flex-direction: column; }
.gap-4 { gap: 16px; } .gap-6 { gap: 24px; } .gap-8 { gap: 32px; }
.grow { flex: 1; }
.muted { color: var(--ink-3); }
.ink2 { color: var(--ink-2); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
@media (max-width: 900px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } .section { padding: 64px 0; } }
.kv { display: grid; grid-template-columns: 112px 1fr; gap: 6px 14px; font-size: 13px; }
.kv dt { font-family: 'JetBrains Mono', monospace; color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; padding-top: 2px; }
.kv dd { margin: 0; color: var(--ink); }
.reveal { opacity: 0; transform: translateY(40px) scale(0.985); transition: opacity 0.9s cubic-bezier(.2,.7,.2,1), transform 0.9s cubic-bezier(.2,.7,.2,1); will-change: opacity, transform; }
.reveal.is-visible { opacity: 1; transform: translateY(0) scale(1); }
.hero-workspace { opacity: 0; transform: translateY(60px) scale(0.985); transition: opacity 900ms cubic-bezier(.2,.7,.2,1), transform 900ms cubic-bezier(.2,.7,.2,1); will-change: transform, opacity; }
.hero-workspace.is-visible { opacity: 1; transform: translateY(0) scale(1); }
@keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.65; } 100% { transform: scale(3.2); opacity: 0; } }
.pulse-ring { position: absolute; border-radius: 999px; background: var(--accent); animation: pulse-ring 2.4s cubic-bezier(.2,.7,.2,1) infinite; pointer-events: none; }
@media (prefers-reduced-motion: reduce) { .reveal, .hero-workspace { opacity: 1; transform: none; transition: none; } html { scroll-behavior: auto; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ── Icons ── */
const Icon = ({ name, size = 16, stroke = 1.6 }) => {
  const common = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: stroke, strokeLinecap: 'round', strokeLinejoin: 'round' };
  const paths = {
    pin: <><path d="M12 21s-7-6.4-7-12a7 7 0 1 1 14 0c0 5.6-7 12-7 12Z"/><circle cx="12" cy="9" r="2.4"/></>,
    layers: <><path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="m3 13 9 5 9-5"/><path d="m3 18 9 5 9-5"/></>,
    filter: <><path d="M4 5h16"/><path d="M7 12h10"/><path d="M10 19h4"/></>,
    message: <><path d="M21 12a8 8 0 0 1-11.7 7.1L4 20l1-4.6A8 8 0 1 1 21 12Z"/></>,
    camera: <><path d="M4 8h3l2-2h6l2 2h3v11H4z"/><circle cx="12" cy="13" r="3.2"/></>,
    bell: <><path d="M6 9a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z"/><path d="M10 19a2 2 0 0 0 4 0"/></>,
    shield: <><path d="M12 3 4 6v6c0 4.5 3.4 8.3 8 9 4.6-.7 8-4.5 8-9V6l-8-3Z"/></>,
    truck: <><path d="M3 7h11v9H3z"/><path d="M14 10h4l3 3v3h-7"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></>,
    compass: <><circle cx="12" cy="12" r="9"/><path d="m14.5 9.5-1.5 5-5 1.5 1.5-5 5-1.5Z"/></>,
    search: <><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></>,
    plus: <><path d="M12 5v14"/><path d="M5 12h14"/></>,
    check: <path d="m5 12 5 5L20 7"/>,
    arrow: <><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></>,
    chevron: <path d="m9 6 6 6-6 6"/>,
    chevronDown: <path d="m6 9 6 6 6-6"/>,
    mountain: <><path d="m3 19 6-10 4 6 3-4 5 8Z"/></>,
    boxes: <><path d="M3 7h8v6H3z"/><path d="M13 11h8v6h-8z"/><path d="M8 13h8v6H8z"/></>,
    users: <><circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><circle cx="17" cy="9" r="2.4"/><path d="M15 20a5 5 0 0 1 6-4.6"/></>,
    route: <><circle cx="6" cy="6" r="2.2"/><circle cx="18" cy="18" r="2.2"/><path d="M8 7c5 1 4 5 0 6s-5 5 0 5.5"/></>,
    doc: <><path d="M7 3h8l5 5v13H7z"/><path d="M15 3v5h5"/><path d="M10 13h7M10 17h7"/></>,
    flag: <><path d="M5 3v18"/><path d="M5 4h13l-2 4 2 4H5"/></>,
    sparkles: <><path d="M12 4v4M12 16v4M4 12h4M16 12h4"/><path d="m6.5 6.5 2 2M15.5 15.5l2 2M6.5 17.5l2-2M15.5 8.5l2-2"/></>,
    cube: <><path d="M12 3 3 7.5v9L12 21l9-4.5v-9L12 3Z"/><path d="M3 7.5 12 12l9-4.5M12 12v9"/></>,
  };
  return <svg {...common}>{paths[name] || null}</svg>;
};

/* ── Logo ── */
const Logo = ({ size = 26 }) => (
  <div className="logo-mark" style={{ width: size, height: size }}>
    <svg width={size * 0.58} height={size * 0.58} viewBox="0 0 24 24" fill="var(--accent)" stroke="var(--accent)" strokeWidth="3.2" strokeLinejoin="round" strokeLinecap="round">
      <path d="M12 5 L20 19 L4 19 Z"/>
    </svg>
  </div>
);

/* ── Map Topo ── */
const Topo = ({ seed = 1 }) => {
  const lines = useMemo(() => {
    const out = [];
    const rand = (i) => Math.sin((i + seed) * 19.13) * 0.5 + 0.5;
    for (let i = 0; i < 14; i++) {
      const cx = 120 + rand(i*3)*480, cy = 120 + rand(i*5+1)*280;
      const rx = 60 + rand(i*7+2)*180, ry = 40 + rand(i*11+3)*120;
      const rot = rand(i*13)*180;
      out.push(<ellipse key={i} cx={cx} cy={cy} rx={rx} ry={ry} transform={`rotate(${rot} ${cx} ${cy})`} fill="none" stroke="var(--map-line)" strokeWidth="1" opacity={0.55}/>);
    }
    return out;
  }, [seed]);
  return (
    <svg viewBox="0 0 720 400" preserveAspectRatio="xMidYMid slice" style={{ position:'absolute', inset:0, width:'100%', height:'100%' }}>
      <path d="M-20,280 C120,240 220,310 340,280 C460,250 560,320 760,280 L760,420 L-20,420 Z" fill="var(--map-water)" opacity="0.7"/>
      {lines}
      <path d="M-20,200 C140,200 220,120 360,160 C500,200 580,160 760,180" fill="none" stroke="var(--surface)" strokeWidth="6" opacity="0.9"/>
      <path d="M-20,200 C140,200 220,120 360,160 C500,200 580,160 760,180" fill="none" stroke="var(--map-line)" strokeWidth="6.5" opacity="0.5"/>
      <path d="M120,-20 C130,120 200,180 240,300 C260,360 220,420 220,500" fill="none" stroke="var(--surface)" strokeWidth="4" opacity="0.85"/>
      <path d="M500,-20 C505,100 560,180 540,320" fill="none" stroke="var(--surface)" strokeWidth="3.5" opacity="0.8"/>
      <g opacity="0.5" stroke="var(--map-line)" strokeWidth="1" fill="none">
        <rect x="40" y="60" width="90" height="48"/><rect x="130" y="60" width="70" height="48"/>
        <rect x="40" y="108" width="160" height="52"/><rect x="560" y="60" width="90" height="70"/>
        <rect x="560" y="130" width="90" height="50"/><rect x="300" y="330" width="120" height="46"/>
      </g>
    </svg>
  );
};

/* ── Pin ── */
const Pin = ({ type='have', label, top, left, active=false, size='md', pulse=false, count, onClick }) => {
  const bg = type==='have' ? 'var(--accent)' : type==='need' ? 'var(--warn)' : 'var(--ink-2)';
  const sz = size==='sm' ? 22 : size==='lg' ? 34 : 28;
  return (
    <div onClick={onClick} style={{ position:'absolute', top, left, transform:'translate(-50%,-100%)', cursor:onClick?'pointer':'default', zIndex:active?3:1 }}>
      {pulse && <div className="pulse-ring" style={{ width:sz, height:sz, left:'50%', top:0, marginLeft:-sz/2, marginTop:sz/2-2, opacity:0.3 }}/>}
      <div style={{ width:sz, height:sz, borderRadius:'50% 50% 50% 2px', transform:'rotate(-45deg)', background:bg, border:'2px solid var(--surface)', boxShadow:active?'0 6px 16px -4px rgba(28,31,34,0.4)':'0 4px 10px -3px rgba(28,31,34,0.28)', display:'grid', placeItems:'center', color:'white', transition:'all .2s ease' }}>
        <div style={{ transform:'rotate(45deg)', fontFamily:'JetBrains Mono,monospace', fontSize:10, fontWeight:600, letterSpacing:'-0.02em' }}>
          {count || (type==='have'?'H':type==='need'?'N':'•')}
        </div>
      </div>
      {label && <div style={{ position:'absolute', top:sz+4, left:'50%', transform:'translateX(-50%)', background:'var(--surface)', border:'1px solid var(--hairline)', borderRadius:4, padding:'3px 7px', fontSize:11, fontFamily:'JetBrains Mono,monospace', color:'var(--ink-2)', whiteSpace:'nowrap', boxShadow:'var(--shadow-sm)', letterSpacing:'-0.01em' }}>{label}</div>}
    </div>
  );
};

const MapCursor = ({ top, left }) => (
  <div style={{ position:'absolute', top, left, transform:'translate(-50%,-50%)', width:18, height:18, pointerEvents:'none' }}>
    <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="6" fill="none" stroke="var(--ink)" strokeWidth="1.2"/><path d="M9 1v4M9 13v4M1 9h4M13 9h4" stroke="var(--ink)" strokeWidth="1.2"/></svg>
  </div>
);

const Placeholder = ({ label='site photo', aspect='4 / 3', radius=8 }) => (
  <div style={{ aspectRatio:aspect, width:'100%', borderRadius:radius, background:`repeating-linear-gradient(135deg, var(--hairline-2) 0 8px, var(--bg-elev) 8px 16px)`, border:'1px solid var(--hairline)', display:'grid', placeItems:'center', color:'var(--ink-4)', fontFamily:'JetBrains Mono,monospace', fontSize:11, letterSpacing:'0.08em', textTransform:'uppercase' }}>{label}</div>
);

/* ── Nav ── */
const Nav = () => (
  <div className="nav">
    <div className="container nav-inner">
      <a href="/app" className="logo">
        <Logo/>
        <span>DirtLink</span>
        <span className="mono" style={{ fontSize:10, color:'var(--ink-4)', letterSpacing:'0.12em', padding:'2px 6px', border:'1px solid var(--hairline)', borderRadius:3, marginLeft:4 }}>BETA</span>
      </a>
      <div className="nav-links" style={{ alignItems:'center' }}>
        <a href="#how">How it works</a>
        <a href="#features">Features</a>
        <a href="#showcase">Product</a>
        <a href="#usecases">Use cases</a>
        <a href="#pricing" className="muted">Pricing</a>
      </div>
      <div className="row gap-4" style={{ alignItems:'center' }}>
        <a href="/app" className="btn btn-ghost btn-sm">Log in</a>
        <a href="/app" className="btn btn-primary btn-sm">Get started <Icon name="arrow" size={14}/></a>
      </div>
    </div>
  </div>
);

/* ── Hero ── */
const Hero = () => {
  const [selected, setSelected] = useState(1);
  const listings = [
    { id:0, type:'have', title:'Topsoil — screened',  qty:'340 m³',   site:'Rocky View — Lot 7',       dist:'4.2 km', top:'42%', left:'22%' },
    { id:1, type:'have', title:'Clean fill',          qty:'1,200 m³', site:'Foothills Development',    dist:'6.8 km', top:'28%', left:'44%', active:true },
    { id:2, type:'need', title:'Structural fill',     qty:'800 m³',   site:'Bow River Foundations',    dist:'3.1 km', top:'55%', left:'58%' },
    { id:3, type:'have', title:'Rock / boulders',     qty:'220 m³',   site:'Nose Hill Quarry',         dist:'12 km',  top:'38%', left:'74%' },
    { id:4, type:'need', title:'Granular A/B',        qty:'450 t',    site:'Stoney Trail Infrastructure', dist:'9.5 km', top:'64%', left:'30%' },
    { id:5, type:'have', title:'Concrete crush',      qty:'180 m³',   site:'East Calgary Yard',        dist:'7.2 km', top:'72%', left:'68%' },
  ];
  const current = listings[selected];
  return (
    <section style={{ paddingTop:72, paddingBottom:96 }}>
      <div className="container">
        <div style={{ display:'grid', gridTemplateColumns:'1.05fr 0.95fr', gap:48, alignItems:'end', marginBottom:36 }} className="hero-head">
          <div>
            <div className="eyebrow">Earth material network · Calgary, AB</div>
            <h1 style={{ marginTop:18 }}>The nearest pile of dirt you need<br/><span style={{ color:'var(--ink-3)' }}>is probably 4 km away.</span></h1>
          </div>
          <div className="col gap-6" style={{ paddingBottom:8 }}>
            <p className="lede">DirtLink is a map-based network for sites that <em style={{ color:'var(--accent)', fontStyle:'normal' }}>have</em> or{' '}<em style={{ color:'var(--warn)', fontStyle:'normal' }}>need</em> earth material. Drop a pin, list what's on the ground, and connect with operators nearby — before the next truck rolls.</p>
            <div className="row gap-4" style={{ flexWrap:'wrap' }}>
              <a href="/app" className="btn btn-primary">Get started — it's free <Icon name="arrow" size={14}/></a>
              <a href="#how" className="btn btn-secondary"><Icon name="chevron" size={15}/> See how it works</a>
            </div>
            <div className="row gap-6 mono" style={{ fontSize:12, color:'var(--ink-3)', flexWrap:'wrap' }}>
              <span><Icon name="check" size={12}/> &nbsp;No card required</span>
              <span><Icon name="check" size={12}/> &nbsp;Map access in 60s</span>
              <span><Icon name="check" size={12}/> &nbsp;Built for field use</span>
            </div>
          </div>
        </div>

        <div className="hero-tile hero-workspace" style={{ background:'var(--surface)', boxShadow:'var(--shadow-lg)', padding:0, overflow:'hidden', borderRadius:14, border:'1px solid var(--hairline)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:14, padding:'12px 16px', borderBottom:'1px solid var(--hairline)', background:'var(--bg-elev)' }}>
            <div style={{ display:'flex', gap:6 }}>
              <span style={{ width:10, height:10, borderRadius:99, background:'var(--hairline)' }}/>
              <span style={{ width:10, height:10, borderRadius:99, background:'var(--hairline)' }}/>
              <span style={{ width:10, height:10, borderRadius:99, background:'var(--hairline)' }}/>
            </div>
            <div className="mono" style={{ fontSize:12, color:'var(--ink-3)', padding:'4px 10px', background:'var(--surface)', border:'1px solid var(--hairline)', borderRadius:5, flex:1, maxWidth:440 }}>app.dirtlink.ca / map · 51.0447° N, 114.0719° W</div>
            <div className="row gap-4 mono" style={{ fontSize:11, color:'var(--ink-3)' }}>
              <span><span className="dot" style={{ color:'#3FB27F' }}/> &nbsp;live</span>
              <span>Calgary, AB</span>
            </div>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'280px 1fr 320px', height:560 }} className="hero-grid">
            {/* Filter rail */}
            <div style={{ borderRight:'1px solid var(--hairline)', padding:'18px 16px', overflow:'auto' }} className="hero-rail">
              <div className="mono" style={{ fontSize:11, color:'var(--ink-3)', textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:12 }}>Filters</div>
              <div style={{ marginBottom:18 }}>
                <div style={{ display:'flex', gap:0, padding:3, background:'var(--bg-elev)', border:'1px solid var(--hairline)', borderRadius:7 }}>
                  {['All','Have','Need'].map((t,i) => (
                    <div key={t} style={{ flex:1, textAlign:'center', padding:'6px 0', fontSize:12.5, cursor:'pointer', background:i===0?'var(--surface)':'transparent', borderRadius:5, boxShadow:i===0?'var(--shadow-sm)':'none', color:i===0?'var(--ink)':'var(--ink-3)', fontWeight:i===0?500:400 }}>{t}</div>
                  ))}
                </div>

/* ── App ── */
function App() {
  useEffect(() => {
    const targets = document.querySelectorAll('.hero-workspace');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('is-visible'); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    targets.forEach(t => io.observe(t));
    requestAnimationFrame(() => { targets.forEach(t => { const r = t.getBoundingClientRect(); if (r.top < window.innerHeight * 0.9) t.classList.add('is-visible'); }); });
    return () => io.disconnect();
  }, []);

  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('is-visible'); io.unobserve(e.target); } });
    }, { threshold: 0.15, rootMargin: '0px 0px -60px 0px' });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <React.Fragment>
      <Nav/>
      <Hero/>
      <HowItWorks/>
      <Features/>
      <Why/>
      <Showcase/>
      <UseCases/>
      <Pricing/>
      <CTA/>
      <Footer/>
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
